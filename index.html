<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Confetti JS for animation -->

    <style>
        :root {
            --bg-body: #f8f9fa;
            --bg-sidebar: #0f172a;
            --text-sidebar: #cbd5e1;
            --text-sidebar-hover: #ffffff;
            --bg-card: #ffffff;
            --text-main: #334155;
            --primary: #3b82f6;
        }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; overflow: hidden; margin: 0; }
        
        /* Sidebar */
        .sidebar { width: 250px; background-color: var(--bg-sidebar); color: var(--text-sidebar); display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h4 { color: white; margin: 0; font-size: 1.2rem; display: flex; align-items: center; gap: 8px;}
        .nav-links { flex: 1; overflow-y: auto; padding-top: 10px; }
        .nav-link { color: var(--text-sidebar); padding: 12px 20px; display: flex; align-items: center; gap: 10px; border-left: 3px solid transparent; cursor: pointer; text-decoration: none; font-size: 0.95rem; }
        .nav-link:hover, .nav-link.active { background-color: rgba(255,255,255,0.05); color: var(--text-sidebar-hover); border-left-color: var(--primary); }
        
        /* Main Content */
        .main-content { flex: 1; padding: 25px; overflow-y: auto; position: relative; }
        .tab-content { display: none; background: var(--bg-card); border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 20px; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Header */
        .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #e2e8f0; }
        .content-header h2 { margin: 0; font-size: 1.5rem; color: #1e293b; }
        
        /* Table Controls */
        .table-responsive { max-height: calc(100vh - 180px); overflow-y: auto; border-radius: 8px; border: 1px solid #e2e8f0; }
        table { margin: 0; width: 100%; border-collapse: collapse; }
        table th { position: sticky; top: 0; background: #f8fafc; z-index: 10; box-shadow: 0 1px 2px rgba(0,0,0,0.05); color: #64748b; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; padding: 12px 15px; border-bottom: 2px solid #e2e8f0; cursor: pointer; transition: background 0.2s; user-select: none; }
        table th:hover { background-color: #e2e8f0; color: #1e293b; }
        table td { padding: 12px 15px; border-bottom: 1px solid #e2e8f0; vertical-align: middle; font-size: 0.95rem; }
        table tbody tr:hover { background-color: #f1f5f9; }
        
        /* Editable Cells */
        .editable-cell { cursor: text; padding: 6px; border-radius: 4px; transition: 0.2s; min-height: 24px; display: block; width: 100%; border: 1px solid transparent; }
        .editable-cell:hover { border-color: #cbd5e1; background-color: #fff; }
        .editable-cell:focus { outline: 2px solid var(--primary); background-color: #fff; border-color: transparent; }
        
        /* Status Badges */
        .status-select { border: none; font-size: 0.75rem; font-weight: 700; border-radius: 20px; padding: 5px 12px; cursor: pointer; outline: none; appearance: none; text-align: center; text-transform: uppercase; }
        .status-concluido { background-color: #d1fae5; color: #065f46; }
        .status-aberto { background-color: #dbeafe; color: #1e40af; }
        .status-aguardando { background-color: #fef3c7; color: #92400e; }
        .status-na { background-color: #f1f5f9; color: #475569; }
        
        /* Progress Input */
        .progress-wrapper { display: flex; align-items: center; gap: 8px; }
        .progress-input { width: 65px; padding: 4px 8px; border: 1px solid #cbd5e1; border-radius: 6px; text-align: right; font-size: 0.9rem; }
        .progress-input:focus { outline: 2px solid var(--primary); border-color: transparent; }
        
        /* Medals (Notas) */
        .nota-medal { display: inline-flex; align-items: center; justify-content: center; gap: 5px; font-weight: bold; background: #f8fafc; padding: 4px 10px; border-radius: 8px; border: 1px solid #e2e8f0; cursor: text; min-width: 50px;}
        .nota-ouro { color: #b45309; background: #fef3c7; border-color: #fde68a; } /* Gold */
        .nota-prata { color: #334155; background: #f1f5f9; border-color: #cbd5e1; } /* Silver */
        .nota-bronze { color: #78350f; background: #ffedd5; border-color: #fed7aa; } /* Bronze */
        
        /* Floating Buttons */
        .btn-save-float { position: fixed; bottom: 25px; right: 25px; border-radius: 50px; padding: 12px 24px; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); z-index: 1000; display: none; font-weight: bold; font-size: 1rem; transition: transform 0.2s; }
        .btn-save-float:hover { transform: translateY(-2px); }
        
        /* Actions Column */
        .action-btns { display: flex; gap: 5px; }
        .btn-icon { padding: 4px 8px; font-size: 0.9rem; }
        
        /* Sort Icons */
        .sort-icon { font-size: 0.8rem; margin-left: 5px; color: var(--primary); }
    </style>
</head>

 "Luigi's Mansion 3", "Tipo": "Ação / Aventura", "Console ": "Nintendo", "Progresso": "100", "STATUS ": "CONCLUIDO", "NOTA": "9"}, {"id": "jogos_4", "Item": "Reanimal", "Tipo": "Terror", "Console ": "PS5", "Progresso": "100", "STATUS ": "CONCLUIDO", "NOTA": "10"}, {"id": "jogos_5", "Item": "Mario Odyssei", "Tipo": "Ação / Aventura", "Console ": "Nintendo", "Progresso": "75", "STATUS ": "ABERTO", "NOTA": "10"}, {"id": "jogos_6", "Item": "Pragmata", "Tipo": "Ação / Aventura", "Console ": "PS5", "Progresso": "0", "STATUS ": "AGUARDANDO", "NOTA": "2026-05-08"}, {"id": "jogos_7", "Item": "Mario Wonder", "Tipo": "Ação / Aventura", "Console ": "Nintendo", "Progresso": "100", "STATUS ": "CONCLUIDO", "NOTA": "2026-05-09"}, {"id": "jogos_8", "Item": "Resident Evil Requiem", "Tipo": "Terror", "Console ": "PS5", "Progresso": "100", "STATUS ": "CONCLUIDO", "NOTA": "2026-05-09"}, {"id": "jogos_9", "Item": "Silent Hill f", "Tipo": "Ação / Aventura", "Console ": "XBOX", "Progresso": "100", "STATUS ": "CONCLUIDO", "NOTA": "2026-05-09"}, {"id": "jogos_10", "Item": "Metal Gear Solid 3 Remake", "Tipo": "Ação / Aventura", "Console ": "PS5", "Progresso": "0", "STATUS ": "AGUARDANDO", "NOTA": ""}, {"id": "jogos_11", "Item": "Split Fiction", "Tipo": "Ação / Aventura", "Console ": "PS5", "Progresso": "0", "STATUS ": "AGUARDANDO", "NOTA": ""}, {"id": "jogos_12", "Item": "Wahammer 40k 2", "Tipo": "Ação / Aventura", "Console ": "XBOX", "Progresso": "0", "STATUS ": "AGUARDANDO", "NOTA": ""}, {"id": "jogos_13", "Item": "007 First Figther", "Tipo": "Ação / Aventura", "Console ": "PS5", "Progresso": "0", "STATUS ": "", "NOTA": ""}]}, "livros": {"title": "📚 Livros", "columns": ["Item", "Tipo", "Progresso", "STATUS ", "NOTA"], "rows": [{"id": "livros_0", "Item": "Akira Vol 5", "Tipo": "Mangá", "Progresso": "75", "STATUS ": "ABERTO", "NOTA": ""}, {"id": "livros_1", "Item": "Boa Noite Punpun", "Tipo": "Mangá", "Progresso": "75", "STATUS ": "ABERTO", "NOTA": ""}, {"id": "livros_2", "Item": "Akira Vol 6", "Tipo": "Mangá", "Progresso": "0", "STATUS ": "", "NOTA": ""}, {"id": "livros_3", "Item": "Trilogia dos Espinhos PARTE 2", "Tipo": "Drama/ Romance", "Progresso": "0", "STATUS ": "", "NOTA": ""}]}};

        let appData = {};
        let currentTabId = "";
        let currentModalTab = "";
        let sortConfig = {}; // Armazena a configuração de ordenação de cada tabela

        // ==========================================
        // INICIALIZAÇÃO
        // ==========================================
        function initApp() {
            const saved = localStorage.getItem('dashboard2026_data_v4');
            if (saved) {
                appData = JSON.parse(saved);
                for(let k in initialData) {
                    if(!appData[k]) appData[k] = initialData[k];
                }
            } else {
                appData = JSON.parse(JSON.stringify(initialData));
            }
            
            renderMenu();
            renderAllTabs();
            showTab(Object.keys(appData)[0]);
        }

        // ==========================================
        // RENDERIZAÇÃO
        // ==========================================
        function renderMenu() {
            const navLinks = document.getElementById('navLinks');
            navLinks.innerHTML = "";
            for (const key in appData) {
                const tab = appData[key];
                navLinks.innerHTML += `<a class="nav-link" id="nav-${key}" onclick="showTab('${key}')">${tab.title}</a>`;
            }
        }

        function showTab(tabId) {
            currentTabId = tabId;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.getElementById(`nav-${tabId}`).classList.add('active');
        }

        function renderAllTabs() {
            const container = document.getElementById('mainContent');
            container.innerHTML = "";

            for (const key in appData) {
                const tabData = appData[key];
                
                let html = `
                    <div id="tab-${key}" class="tab-content">
                        <div class="content-header">
                            <h2>${tabData.title}</h2>
                            <button class="btn btn-primary" onclick="openAddModal('${key}')">
                                <i class="bi bi-plus-lg"></i> Novo Item
                            </button>
                        </div>
                        <div class="table-responsive">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th style="width: 95px; cursor:default;">Ações</th>
                `;
                
                // Cabeçalhos com lógica de Ordenação
                tabData.columns.forEach(col => {
                    let sortIcon = "";
                    if(sortConfig[key] && sortConfig[key].col === col) {
                        sortIcon = sortConfig[key].dir === 'asc' ? '<i class="bi bi-caret-up-fill sort-icon"></i>' : '<i class="bi bi-caret-down-fill sort-icon"></i>';
                    }
                    html += `<th onclick="sortTable('${key}', '${col}')" title="Clique para ordenar">${col} ${sortIcon}</th>`;
                });
                
                html += `           </tr>
                                </thead>
                                <tbody>
                `;

                // Linhas
                tabData.rows.forEach(row => {
                    html += `<tr id="tr-${row.id}">
                                <td>
                                    <div class="action-btns">
                                        <button class="btn btn-outline-secondary btn-icon" onclick="duplicateRow('${key}', '${row.id}')" title="Duplicar"><i class="bi bi-files"></i></button>
                                        <button class="btn btn-outline-danger btn-icon" onclick="deleteRow('${key}', '${row.id}')" title="Excluir"><i class="bi bi-trash3"></i></button>
                                    </div>
                                </td>`;
                    
                    tabData.columns.forEach(col => {
                        html += `<td>${renderCell(key, row, col)}</td>`;
                    });
                    
                    html += `</tr>`;
                });

                html += `
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            }
        }

        // ==========================================
        // ORDENAÇÃO DE COLUNAS (NOVO)
        // ==========================================
        function sortTable(tabKey, colName) {
            if (!sortConfig[tabKey]) sortConfig[tabKey] = { col: null, dir: 'asc' };
            
            let currentSort = sortConfig[tabKey];
            
            // Inverte direção se clicar na mesma coluna
            if (currentSort.col === colName) {
                currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.col = colName;
                currentSort.dir = 'asc';
            }

            // Lógica de parser para descobrir se é número, texto ou vazio
            const parseVal = (v) => {
                if(v === undefined || v === null || v === "") return "";
                let str = String(v).trim();
                let colUpper = colName.toUpperCase().trim();
                
                if(colUpper === "NOTA" || colUpper.includes("PROGRESSO") || colUpper === "KM" || colUpper === "VALOR" || colUpper === "#") {
                    let num = parseFloat(str.replace(/[^0-9.-]+/g,""));
                    return isNaN(num) ? -999999 : num; // Joga pra baixo se não for número validado
                }
                return str.toUpperCase();
            };

            appData[tabKey].rows.sort((a, b) => {
                let pA = parseVal(a[colName]);
                let pB = parseVal(b[colName]);
                
                // Joga os vazios sempre para o final da lista
                if(pA === "" && pB !== "") return 1;
                if(pB === "" && pA !== "") return -1;
                if(pA === "" && pB === "") return 0;

                if (pA < pB) return currentSort.dir === 'asc' ? -1 : 1;
                if (pA > pB) return currentSort.dir === 'asc' ? 1 : -1;
                return 0;
            });
            
            document.getElementById('btnSave').style.display = 'block';
            renderAllTabs();
            showTab(tabKey);
        }

        // ==========================================
        // LÓGICA DAS CÉLULAS (Medalhas, Status, Barras)
        // ==========================================
        function renderCell(tabKey, row, colName) {
            let val = row[colName] !== undefined ? row[colName] : "";
            let colUpper = colName.toUpperCase().trim();
            
            // STATUS
            if (colUpper.includes("STATUS")) {
                const statuses = ["CONCLUIDO", "ABERTO", "AGUARDANDO", "REALIZADO", "NA", ""];
                let v = val.toString().toUpperCase().trim();
                if(v === "CONCLUÍDO") v = "CONCLUIDO";
                
                let select = `<select class="status-select ${getStatusClass(v)}" onchange="updateData('${tabKey}', '${row.id}', '${colName}', this.value); this.className='status-select ' + getStatusClass(this.value)">`;
                statuses.forEach(s => {
                    let text = s === "" ? "SELECIONE" : s;
                    select += `<option value="${s}" ${v === s ? 'selected' : ''}>${text}</option>`;
                });
                select += `</select>`;
                return select;
            }
            
            // PROGRESSO
            if (colUpper.includes("PROGRESSO")) {
                let num = parseInt(val) || 0;
                return `
                    <div class="progress-wrapper">
                        <input type="number" class="progress-input" value="${num}" min="0" max="100" 
                        onchange="handleProgressChange('${tabKey}', '${row.id}', '${colName}', this.value)"> %
                    </div>
                `;
            }
            
            // NOTA (Medalhas de Ouro, Prata, Bronze)
            if (colUpper === "NOTA") {
                let numVal = parseFloat(val);
                
                if (!isNaN(numVal) && val !== "") {
                    if (numVal === 10) {
                        return `<span class="nota-medal nota-ouro" contenteditable="true" onblur="updateData('${tabKey}', '${row.id}', '${colName}', this.innerText.replace(/[^0-9.]/g, '').trim())">🥇 ${numVal}</span>`;
                    } else if (numVal >= 9) {
                        return `<span class="nota-medal nota-prata" contenteditable="true" onblur="updateData('${tabKey}', '${row.id}', '${colName}', this.innerText.replace(/[^0-9.]/g, '').trim())">🥈 ${numVal}</span>`;
                    } else if (numVal >= 7 && numVal < 9) {
                        return `<span class="nota-medal nota-bronze" contenteditable="true" onblur="updateData('${tabKey}', '${row.id}', '${colName}', this.innerText.replace(/[^0-9.]/g, '').trim())">🥉 ${numVal}</span>`;
                    }
                }
            }
            
            // CÉLULA PADRÃO (Texto editável)
            return `<span class="editable-cell" contenteditable="true" onblur="updateData('${tabKey}', '${row.id}', '${colName}', this.innerText)">${val}</span>`;
        }

        function getStatusClass(val) {
            let v = val.toString().toUpperCase().trim();
            if (v === "CONCLUIDO" || v === "REALIZADO") return "status-concluido";
            if (v === "ABERTO") return "status-aberto";
            if (v === "AGUARDANDO" || v === "STAND BY") return "status-aguardando";
            return "status-na";
        }

        // ==========================================
        // ATUALIZAÇÃO E REGRAS DE NEGÓCIO
        // ==========================================
        function updateData(tabKey, rowId, colName, value) {
            let row = appData[tabKey].rows.find(r => r.id === rowId);
            if (row && row[colName] !== value) {
                row[colName] = value;
                document.getElementById('btnSave').style.display = 'block';
                
                // Se atualizou nota, re-renderiza para processar a medalha
                if(colName.toUpperCase().trim() === "NOTA") {
                    renderAllTabs();
                    showTab(tabKey);
                }
            }
        }

        // Função Especial para Progresso (Dispara Animação e Status)
        function handleProgressChange(tabKey, rowId, colName, value) {
            let row = appData[tabKey].rows.find(r => r.id === rowId);
            if (row) {
                let num = parseInt(value) || 0;
                if(num > 100) num = 100;
                row[colName] = num.toString();
                document.getElementById('btnSave').style.display = 'block';

                // Regra: Se chegou a 100%, muda o status para CONCLUIDO
                if (num === 100) {
                    let statusCol = appData[tabKey].columns.find(c => c.toUpperCase().includes("STATUS"));
                    if (statusCol && row[statusCol] !== "CONCLUIDO" && row[statusCol] !== "REALIZADO") {
                        row[statusCol] = "CONCLUIDO";
                        triggerConfetti();
                    }
                }
                renderAllTabs();
                showTab(tabKey);
            }
        }

        function triggerConfetti() {
            if(typeof confetti === "function") {
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#3b82f6', '#10b981', '#f59e0b', '#fde047']
                });
            }
        }

        // ==========================================
        // AÇÕES DA TABELA (Duplicar, Excluir, Adicionar)
        // ==========================================
        function duplicateRow(tabKey, rowId) {
            const tabData = appData[tabKey];
            const originalRow = tabData.rows.find(r => r.id === rowId);
            if (originalRow) {
                let newRow = JSON.parse(JSON.stringify(originalRow));
                newRow.id = "id_" + Date.now();
                
                let index = tabData.rows.findIndex(r => r.id === rowId);
                tabData.rows.splice(index + 1, 0, newRow);
                
                document.getElementById('btnSave').style.display = 'block';
                renderAllTabs();
                showTab(tabKey);
            }
        }

        function deleteRow(tabKey, rowId) {
            if(confirm("Tem certeza que deseja excluir este item?")) {
                appData[tabKey].rows = appData[tabKey].rows.filter(r => r.id !== rowId);
                document.getElementById('btnSave').style.display = 'block';
                renderAllTabs();
                showTab(tabKey);
            }
        }

        function openAddModal(tabKey) {
            currentModalTab = tabKey;
            const tabData = appData[tabKey];
            document.getElementById('modalTitle').innerText = `Novo em: ${tabData.title}`;
            
            let formHtml = `<form id="addForm">`;
            tabData.columns.forEach(col => {
                let colU = col.toUpperCase().trim();
                formHtml += `<div class="mb-3"><label class="form-label">${col}</label>`;
                
                if (colU.includes("STATUS")) {
                    formHtml += `<select class="form-select" id="input-${col}">
                                    <option value="ABERTO">ABERTO</option>
                                    <option value="AGUARDANDO">AGUARDANDO</option>
                                    <option value="CONCLUIDO">CONCLUÍDO</option>
                                 </select>`;
                } else if (colU.includes("PROGRESSO")) {
                    formHtml += `<input type="number" class="form-control" id="input-${col}" value="0" min="0" max="100">`;
                } else {
                    formHtml += `<input type="text" class="form-control" id="input-${col}">`;
                }
                
                formHtml += `</div>`;
            });
            formHtml += `</form>`;
            
            document.getElementById('modalBody').innerHTML = formHtml;
            new bootstrap.Modal(document.getElementById('addModal')).show();
        }

        function saveNewItem() {
            const tabData = appData[currentModalTab];
            let newRow = { id: "id_" + Date.now() }; 
            
            tabData.columns.forEach(col => {
                newRow[col] = document.getElementById(`input-${col}`).value;
            });
            
            tabData.rows.push(newRow);
            document.getElementById('btnSave').style.display = 'block';
            
            bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
            renderAllTabs();
            showTab(currentModalTab);
        }

        // ==========================================
        // SALVAR E EXPORTAR
        // ==========================================
        function saveData() {
            localStorage.setItem('dashboard2026_data_v4', JSON.stringify(appData));
            document.getElementById('btnSave').style.display = 'none';
            
            let btn = document.getElementById('btnSave');
            let origHTML = btn.innerHTML;
            btn.innerHTML = '<i class="bi bi-check-circle-fill"></i> Salvo!';
            btn.classList.replace('btn-success', 'btn-primary');
            btn.style.display = 'block';
            setTimeout(() => {
                btn.innerHTML = origHTML;
                btn.classList.replace('btn-primary', 'btn-success');
                btn.style.display = 'none';
            }, 2000);
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appData));
            const a = document.createElement('a');
            a.href = dataStr;
            a.download = "backup_dashboard_2026_final.json";
            document.body.appendChild(a);
            a.click();
            a.remove();
        }

        window.onload = initApp;

    </script>
