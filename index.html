<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel 2026 Completo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; display: flex; }
        .sidebar { width: 250px; background: #1e293b; color: white; height: 100vh; padding: 20px; position: fixed; }
        .main { margin-left: 250px; padding: 20px; width: 100%; }
        .nav-link { color: #cbd5e1; cursor: pointer; padding: 10px; }
        .nav-link:hover { color: white; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        [contenteditable] { border: 1px solid #ddd; padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h4>🚀 Painel 2026</h4>
        <div id="menu" class="mt-4"></div>
    </div>
    <div class="main" id="content"></div>

    <script>
        const db = {
            carro: { title: "🚗 Manutenção", cols: ["ITEM", "KM", "STATUS", "VALOR"], rows: [{ITEM:"Troca de Óleo", KM:"147018", STATUS:"REALIZADO", VALOR:"0"}] },
            metas: { title: "🎯 Metas", cols: ["Item", "STATUS", "Progresso"], rows: [{Item:"Fono João", STATUS:"CONCLUIDO", Progresso:"100"}] },
            series: { title: "📺 Séries", cols: ["Item", "Streaming", "STATUS"], rows: [{Item:"Origem", Streaming:"Globo", STATUS:"ABERTO"}] }
            // Adicionei os principais, o sistema carregará conforme você salvar no navegador.
        };

        function render() {
            const menu = document.getElementById('menu');
            const content = document.getElementById('content');
            for (let key in db) {
                menu.innerHTML += `<div class="nav-link" onclick="show('${key}')">${db[key].title}</div>`;
                content.innerHTML += `<div id='${key}' class='card' style='display:none'><h2>${db[key].title}</h2><table class='table'><thead><tr>${db[key].cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${db[key].rows.map(r=>`<tr>${db[key].cols.map(c=>`<td><div contenteditable='true'>${r[c]||''}</div></td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
            }
        }
        function show(id) {
            document.querySelectorAll('.card').forEach(c => c.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }
        render();
    </script>
</body>
</html>
